<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADIF - Parte de Trabajo</title>

  <link rel="stylesheet" href="styles.css">
  
  <script src="app.js" defer></script>
  
</head>

<body>

  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

  <!-- BOTONES NUEVO RECUPERAR GUARDAR -->
  <button type="button" onclick="nuevoParte()">🆕 Nuevo</button>

  <!--<button type="button" onclick="recuperarParte()">♻️ Recuperar</button> -->
  
  <button type="button" onclick="guardarManual()">💾 Guardar</button>

  <h1>ADIF - Mantenimiento de Infraestructura</h1>
  <h2>Registro de trabajos externos</h2>

  <!-- DATOS GENERALES -->
  <h2>Datos Generales</h2>
  <input id="actuacion_principal" placeholder="Actuación principal">
  <input id="fecha" type="date">
  <input id="linea" placeholder="Línea">
  <input id="jefatura" placeholder="Jefatura">
  <input id="distrito" placeholder="Distrito">

  <!-- RECURSOS HUMANOS -->
  <h2>Recursos Humanos</h2>
  <div id="trabajadores"></div>
  <button type="button" onclick="addTrabajador()">+ Añadir trabajador</button>

  <!-- VEHICULOS -->
  <h2>Vehículos</h2>
  <div id="maquinaria"></div>
  <button type="button" onclick="addMaquina()">+ Añadir vehículo</button>

  <!-- MATERIAL -->
  <h2>Material ADIF</h2>
  <div id="material"></div>
  <button type="button" onclick="addMaterial()">+ Añadir material</button>

  <!-- CORTE VIA -->
  <h2>Corte de Vía</h2>
  <div id="corte_via"></div>
  <button type="button" onclick="addCorteVia()">+ Añadir corte</button>

  <!-- CORTE TENSION -->
  <h2>Corte de Tensión</h2>
  <div id="corte_tension"></div>
  <button type="button" onclick="addCorteTension()">+ Añadir corte</button>

  <!-- PAGINA 2 -->
  <h2>Página 2 - Ubicación</h2>
  <div id="ubicaciones"></div>
  <button type="button" onclick="addUbicacion()">+ Añadir ubicación</button>

  <h2>Actuaciones</h2>
  <div id="actuaciones"></div>
  <button type="button" onclick="addActuacion()">+ Añadir actuación</button>

  <h2>Detalle de los trabajos</h2>
<textarea 
  id="detalle_trabajos" 
  rows="4" 
  cols="80" 
  maxlength="1000"
  placeholder="Detalle de los trabajos realizados...">
</textarea>

  <!-- OBS -->
  <h2>Observaciones</h2>
<textarea 
  id="observaciones" 
  rows="4" 
  cols="80"
  maxlength="300"
  placeholder="Observaciones...">
</textarea>

  <!-- FIRMAS -->
  <h2>Firmas</h2>
  <input id="agente_ute" placeholder="Agente UTE">
  <input id="encargado" placeholder="Encargado">

  <br><br>

  <!-- <button type="button" onclick="verJSON()">💾 Ver JSON</button>
  <pre id="out"></pre> -->

<button onclick="generarPDF()" style="background:#28a745">📄 Generar PDF</button>


</body>
</html>
